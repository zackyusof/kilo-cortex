# ============================================================
# KILO CORTEX — Redis Configuration
# ============================================================

bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
save 60 1
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Logging
loglevel notice
logfile ""

# Key prefix for Kilo
# All keys are prefixed with "kilo:" in the application
# This is enforced at the application level, not Redis config

# Max clients
maxclients 100
